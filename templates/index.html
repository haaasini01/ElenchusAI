<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ElenchusAI</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.2.0/styles/atom-one-dark.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.2.0/highlight.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
        
        <style>
            :root {
                --bg-color: #050505;
                --panel-bg: rgba(20, 20, 20, 0.85);
                --border-color: #2a2a2a;
                --text-main: #f3f3f3;
                --text-muted: #a0a0a0;
                
                --orange-primary: #ff6b1a; 
                --orange-secondary: #ff8533;
                --orange-glow: rgba(255, 107, 26, 0.4);
            }

            body {
                font-family: 'Inter', sans-serif;
                background-color: var(--bg-color);
                color: var(--text-main);
                margin: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }

            /* Ambient background */
            body::after {
                content: "";
                position: fixed;
                top: 0; left: 0;
                width: 100vw; height: 100vh;
                background: radial-gradient(circle at 80% 0%, rgba(255, 107, 26, 0.12) 0%, transparent 40%),
                            radial-gradient(circle at 20% 100%, rgba(255, 107, 26, 0.08) 0%, transparent 50%);
                z-index: -1;
                pointer-events: none;
            }

            #chat-container {
                width: 100%;
                max-width: 1100px;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                height: 100vh;
                padding: 1.5rem;
            }

            h1 {
                font-family: 'Outfit', sans-serif;
                font-weight: 800;
                text-align: center;
                color: #fff;
                margin: 1rem 0 1.5rem;
                letter-spacing: 1px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }

            h1 span {
                color: var(--orange-primary);
            }

            h1 .glow-dot {
                width: 12px;
                height: 12px;
                background-color: var(--orange-primary);
                border-radius: 50%;
                box-shadow: 0 0 15px var(--orange-primary);
                display: inline-block;
            }

            #chat-history {
                flex-grow: 1;
                overflow-y: auto;
                padding: 1.5rem;
                background: var(--panel-bg);
                border: 1px solid var(--border-color);
                border-radius: 16px;
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                margin-bottom: 1.5rem;
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
                box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            }

            /* Custom Scrollbar */
            ::-webkit-scrollbar { width: 8px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
            ::-webkit-scrollbar-thumb:hover { background: var(--orange-primary); }

            .input-group {
                background: var(--panel-bg);
                border-radius: 16px;
                border: 1px solid var(--border-color);
                overflow: hidden;
                box-shadow: 0 10px 30px rgba(0,0,0,0.6);
                display: flex;
                align-items: stretch;
                flex-shrink: 0;
            }

            #user-input {
                background: transparent;
                border: none;
                color: var(--text-main);
                padding: 1.2rem;
                resize: none;
                font-size: 1rem;
            }
            #user-input:focus {
                outline: none;
                box-shadow: none;
            }
            #user-input::placeholder {
                color: #666;
            }

            .send-btn-container {
                display: flex;
                align-items: stretch;
            }

            #send-btn {
                background: var(--orange-primary);
                border: none;
                border-radius: 0;
                padding: 0 2rem;
                font-weight: 600;
                font-family: 'Outfit', sans-serif;
                font-size: 1rem;
                text-transform: uppercase;
                letter-spacing: 1px;
                transition: all 0.3s ease;
                color: #000;
            }

            #send-btn:hover {
                background: var(--orange-secondary);
                box-shadow: inset 2px 2px 10px rgba(255,255,255,0.2), 0 0 20px var(--orange-glow);
                color: #000;
            }

            /* Chat Bubbles Layout */
            .message-wrapper {
                display: flex;
                width: 100%;
                animation: fadeInUp 0.4s ease forwards;
            }

            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .user-wrapper {
                justify-content: flex-end;
            }
            .ai-wrapper {
                justify-content: flex-start;
            }

            .message-bubble {
                max-width: 80%;
                padding: 1.2rem;
                border-radius: 16px;
                font-size: 0.95rem;
                line-height: 1.6;
                position: relative;
            }

            .user-bubble {
                background: var(--orange-primary);
                color: #050505;
                font-weight: 500;
                border-bottom-right-radius: 4px;
            }

            .ai-bubble {
                background: rgba(40, 40, 40, 0.4);
                border: 1px solid var(--border-color);
                border-bottom-left-radius: 4px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            }

            .message-sender {
                font-family: 'Outfit', sans-serif;
                font-size: 0.75rem;
                font-weight: 700;
                margin-bottom: 0.5rem;
                text-transform: uppercase;
                letter-spacing: 1.5px;
            }

            .user-bubble .message-sender {
                color: rgba(0,0,0,0.5);
            }
            .ai-bubble .message-sender {
                color: var(--orange-primary);
            }

            /* Persona specific accents */
            .socrates-bubble { border-left: 3px solid #ff4757; }
            .theaetetus-bubble { border-left: 3px solid #1e90ff; }
            .plato-bubble { border-left: 3px solid #feca57; }
            .system-bubble { 
                background: rgba(0,0,0,0.2);
                border: 1px dashed #555; 
                color: var(--text-muted);
                font-style: italic;
                font-size: 0.9rem;
                margin: 0 auto;
                text-align: center;
                border-radius: 8px;
            }
            .system-wrapper { justify-content: center; }

            /* Markdown Styling */
            .markdown p:last-child { margin-bottom: 0; }
            .markdown p { margin-bottom: 0.8rem; }
            
            .markdown pre { 
                margin: 1rem 0; 
                border-radius: 8px; 
                background: #111 !important;
                border: 1px solid #333;
            }
            .markdown code {
                font-family: 'Consolas', 'Courier New', monospace;
                font-size: 0.9rem;
            }
            .user-bubble .markdown code {
                background: rgba(0,0,0,0.1);
                color: #000;
                padding: 2px 4px;
                border-radius: 4px;
            }

            /* Code copy button */
            .hljs { position: relative; padding: 1.5rem 1rem 1rem; }
            .copy-code-btn {
                position: absolute;
                top: 6px;
                right: 6px;
                background-color: #333;
                color: #fff;
                border: 1px solid #555;
                border-radius: 4px;
                padding: 4px 10px;
                font-size: 0.7rem;
                font-family: 'Inter', sans-serif;
                cursor: pointer;
                opacity: 0;
                transition: all 0.2s ease;
                z-index: 10;
            }
            .hljs:hover .copy-code-btn { opacity: 1; }
            .copy-code-btn:hover { background-color: var(--orange-primary); border-color: var(--orange-primary); color: #000;}

        </style>
    </head>
    <body>
        <div id="chat-container">
            <h1><div class="glow-dot"></div> Elenchus<span>AI</span></h1>
            <div id="chat-history"></div>
            <div class="input-group">
                <textarea id="user-input" class="form-control" placeholder="Type your message..." rows="2"></textarea>
                <div class="send-btn-container">
                    <button id="send-btn" class="btn btn-sm">Send</button>
                </div>
            </div>
        </div>
        
        <script>
            let requestInProgress = false;
            const md = window.markdownit({
                highlight: function (str, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            const highlighted = hljs.highlightBlock(str, { language: lang });
                            return `<pre class="hljs language-${lang}"><code>${highlighted.value}</code><button class="copy-code-btn" data-clipboard-text="${md.utils.escapeHtml(str)}">Copy</button></pre>`;
                        } catch (__) {}
                    }
                    return `<pre class="hljs"><code>${md.utils.escapeHtml(str)}</code><button class="copy-code-btn" data-clipboard-text="${md.utils.escapeHtml(str)}">Copy</button></pre>`;
                }
            });

            $(document).ready(function() {
                setInterval(obtainActiveMessage, 2000);
                hljs.highlightAll();
                
                $(document).on('click', '.copy-code-btn', function() {
                    var codeText = $(this).attr('data-clipboard-text') || $(this).siblings('code').text();
                    var copyTextarea = document.createElement('textarea');
                    copyTextarea.innerHTML = codeText; // unescape html for copying
                    var rawText = copyTextarea.textContent; // get clean text
                    
                    var tempNode = document.createElement('textarea');
                    tempNode.textContent = rawText;
                    document.body.appendChild(tempNode);
                    tempNode.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempNode);
                    
                    var btn = $(this);
                    btn.text('Copied!');
                    setTimeout(function() { btn.text('Copy'); }, 2000);
                });

                $('#send-btn').on('click', function() {
                    let user_input = $('#user-input').val();
                    if (user_input.trim() !== '') {
                        $('#user-input').val('');
                        addChatMessage('tony', user_input);
                        $.post('/chat', { user_input: user_input }, function(data) {
                            var msg_count = data.length;
                            if (msg_count > 0) {
                                for (var i = 0; i < msg_count; i++) {
                                    if (data[i].response) {
                                        addChatMessage(data[i].role, data[i].response);
                                    }
                                }
                            }
                        }, 'json');
                    }
                });

                // Support sending messages with Enter (and Shift+Enter for newline)
                $('#user-input').on('keydown', function(e) {
                    if (e.which === 13 && !e.shiftKey) {
                        e.preventDefault();
                        $('#send-btn').click();
                    }
                });
            });

            function addChatMessage(sender, message) {
                let formattedMessage = md.render(message).trim();
                let chat_history = $('#chat-history');
                
                let isUser = sender.toLowerCase() === 'tony' || sender.toLowerCase() === 'user';
                let isSystem = sender.toLowerCase() === 'system';
                
                let displayName = sender.charAt(0).toUpperCase() + sender.slice(1);
                if(sender.toLowerCase() === 'tony') displayName = 'You';

                let bubbleClass = isUser ? 'message-bubble user-bubble' : `message-bubble ai-bubble ${sender}-bubble`;
                let wrapperClass = isUser ? 'message-wrapper user-wrapper' : 'message-wrapper ai-wrapper';
                
                if (isSystem) {
                    bubbleClass = 'message-bubble system-bubble';
                    wrapperClass = 'message-wrapper system-wrapper';
                }
                
                let html = `
                    <div class="${wrapperClass}">
                        <div class="${bubbleClass}">
                            <div class="message-sender">${displayName}</div>
                            <div class="markdown">${formattedMessage}</div>
                        </div>
                    </div>
                `;
                
                chat_history.append(html);
                chat_history.scrollTop(chat_history[0].scrollHeight);
                
                chat_history.find('pre code').each(function(i, block) {
                    if(!$(block).hasClass('hljs')) {
                        hljs.highlightBlock(block);
                    }
                });
            } 

            function obtainActiveMessage() {
                if (!requestInProgress) {
                    requestInProgress = true;
                    $.getJSON('/active-message', function (data) {
                        var msg_count = data.length;
                        if (msg_count > 0) {
                            for (var i = 0; i < msg_count; i++) {
                                if (data[i].response) {
                                    addChatMessage(data[i].role, data[i].response);
                                }
                            }
                        }
                    }).always(function() {
                        requestInProgress = false;
                    });
                }
            }
        </script>
    </body>
</html>
